version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seminar-platform-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-seminar_management_platform}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - seminar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-seminar_management_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: seminar-platform-mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - seminar-network

volumes:
  postgres_data:
    driver: local

networks:
  seminar-network:
    driver: bridge